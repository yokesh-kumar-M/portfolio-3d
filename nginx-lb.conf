worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    # ─── Upstream: Round-robin across app replicas ───
    upstream portfolio_backend {
        least_conn;

        server app-1:80 max_fails=3 fail_timeout=30s;
        server app-2:80 max_fails=3 fail_timeout=30s;
        server app-3:80 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    # ─── Logging ───
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ───
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # ─── Rate limiting ───
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # ─── MIME types ───
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Gzip at LB level ───
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml font/woff2;

    server {
        listen 80;
        server_name _;

        # Rate limit
        limit_req zone=general burst=50 nodelay;

        # ─── Proxy to upstream ───
        location / {
            proxy_pass http://portfolio_backend;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;

            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }

        # ─── LB health check ───
        location /lb-health {
            access_log off;
            return 200 '{"status":"load-balancer-healthy"}';
            add_header Content-Type application/json;
        }
    }
}
